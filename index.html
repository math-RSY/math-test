<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.min.js" async></script>
    <style>
        :root { --main: #0984e3; --bg: #f5f6fa; --danger: #fab1a0; --return: #74b9ff; }
        body { margin: 0; font-family: 'Malgun Gothic', sans-serif; height: 100vh; display: flex; flex-direction: column; background: var(--bg); }
        
        /* 대시보드 */
        #adminPanel { display: none; background: #2d3436; color: white; padding: 10px; z-index: 2000; position: fixed; width: 100%; box-sizing: border-box; }
        .table-scroll { background: white; color: black; max-height: 400px; overflow-y: auto; margin-top: 10px; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th, td { border: 1px solid #dfe6e9; padding: 6px; text-align: center; }
        .row-escape { background-color: #ffcccc !important; } /* 연한 빨강 */
        .row-return { background-color: #d1e9ff !important; } /* 파랑 (10초) */
        .score-info { background: #f1f2f6; font-weight: bold; color: var(--main); }

        /* 입력 폼 */
        #loginArea { flex: 1; display: flex; justify-content: center; align-items: center; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 280px; text-align: center; }
        input { padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; border: 1px solid #ddd; border-radius: 5px; font-size: 1rem; }
        
        /* 문제 영역 */
        #studentView { display: none; flex: 1; flex-direction: column; overflow: hidden; background: white; }
        .step-bar { background: #f1f2f6; padding: 10px; display: flex; gap: 5px; overflow-x: auto; }
        .step-btn { padding: 8px 15px; border: 1px solid #ccc; background: white; border-radius: 5px; cursor: pointer; white-space: nowrap; }
        .step-btn.active { background: var(--main); color: white; border-color: var(--main); }
        #problemArea { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .prob-item { margin-bottom: 20px; padding: 15px; border: 1px solid #eee; border-radius: 10px; font-size: 1.1rem; }
        
        /* 답안 박스 (글자 크기와 비슷하게) */
        .ans-input { width: 60px; height: 32px; font-size: 1rem; text-align: center; border: 1px solid var(--main); border-radius: 4px; margin: 0 5px; }
        .frac-box { display: inline-flex; flex-direction: column; vertical-align: middle; }
        .frac-box input { width: 45px; height: 24px; padding: 0; font-size: 0.9rem; margin: 1px 0; }

        .footer { position: fixed; bottom: 0; width: 100%; padding: 15px; background: white; border-top: 1px solid #ddd; display: flex; justify-content: center; gap: 10px; }
        .btn { padding: 10px 25px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        .admin-link { position: fixed; bottom: 5px; right: 5px; color: #eee; font-size: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="admin-link" onclick="openAdmin()">[Admin]</div>

<div id="adminPanel">
    <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
        <b>📊 관리 대시보드</b>
        <button onclick="refreshDash()">🔄 실시간 갱신</button>
        <button onclick="sortDash('sid')">학번순</button>
        <button onclick="sortDash('name')">이름순</button>
        <button onclick="downloadCSV()" style="background:#27ae60; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">CSV 저장</button>
        <button onclick="resetData()" style="background:#e74c3c; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">데이터 삭제</button>
        <button onclick="document.getElementById('adminPanel').style.display='none'">닫기</button>
    </div>
    <div class="table-scroll">
        <table>
            <thead><tr><th>최종시각</th><th>학번</th><th>이름</th><th>상태</th><th>이탈</th></tr></thead>
            <tbody id="dashBody"></tbody>
        </table>
    </div>
</div>

<div id="loginArea">
    <div class="card">
        <h2 style="color:var(--main);">유리수 마스터</h2>
        <input type="text" id="sid" placeholder="학번 (5자리)">
        <input type="text" id="sname" placeholder="이름">
        <input type="number" id="syncCode" placeholder="동기화 코드 (숫자)">
        <button onclick="login()" class="btn" style="background:var(--main); width:100%; margin-top:10px;">시험 시작</button>
    </div>
</div>

<div id="studentView">
    <div class="step-bar" id="stepBar"></div>
    <div id="problemArea"></div>
    <div class="footer">
        <button class="btn" style="background:#27ae60;" onclick="submitStep()">채점 및 제출</button>
        <button class="btn" style="background:#636e72;" onclick="location.reload()">로그아웃</button>
    </div>
</div>

<script>
    let user = { sid:'', name:'', sync:0, escape:0 }, currentStep=1, answers=[], pSeed=1, isLive=false;
    let dashData = [];
    let returnStudents = {}; // 복귀 시각 체크용

    // --- 수학 엔진 ---
    const MathCore={
        gcd:(a,b)=>b?MathCore.gcd(b,a%b):Math.abs(a),
        fCreate:(n,d=1)=>{ const g=MathCore.gcd(n,d); let fn=n/g, fd=d/g; if(fd<0){fn*=-1;fd*=-1} return {n:fn, d:fd}; },
        fTex:(f)=>f.d===1?(f.n<0?`(${f.n})`:`${f.n}`):(f.n<0?`\\left( -\\frac{${Math.abs(f.n)}}{${f.d}} \\right)`:`\\frac{${f.n}}{${f.d}}`),
        fCalc:(f1,f2,op)=>{
            if(op===0) return MathCore.fCreate(f1.n*f2.d+f2.n*f1.d, f1.d*f2.d);
            if(op===1) return MathCore.fCreate(f1.n*f2.d-f2.n*f1.d, f1.d*f2.d);
            if(op===2) return MathCore.fCreate(f1.n*f2.n, f1.d*f2.d);
            if(op===3) return (f2.n===0)?{n:1,d:1}:MathCore.fCreate(f1.n*f2.d, f1.d*f2.n);
        }
    };
    function srnd(){ pSeed=(pSeed*9301+49297)%233280; return pSeed/233280; }

    // --- 문제 생성 (1단 ~ 7단) ---
    function makeProb(step) {
        const r=(min,max)=>Math.floor(srnd()*(max-min+1))+min;
        const rf=()=>MathCore.fCreate(r(-8,8)||1, r(1,3));
        const ops=['+','-','\\times','\\div'];

        if(step==1){ // 정수 +,- (2개)
            let f1=MathCore.fCreate(r(-15,15)), f2=MathCore.fCreate(r(-15,15)), op=r(0,1);
            return {h:`\\(${MathCore.fTex(f1)} ${ops[op]} ${MathCore.fTex(f2)}\\)`, a:MathCore.fCalc(f1,f2,op)};
        }
        if(step==2){ // 정수 *,/ (2개, 정수형)
            let f2=MathCore.fCreate(r(-10,10)||1), op=r(2,3), f1=(op==3?MathCore.fCreate(f2.n*r(-5,5)):MathCore.fCreate(r(-10,10)));
            return {h:`\\(${MathCore.fTex(f1)} ${ops[op]} ${MathCore.fTex(f2)}\\)`, a:MathCore.fCalc(f1,f2,op)};
        }
        if(step==3){ // 유리수 +,- (2개)
            let f1=rf(), f2=rf(), op=r(0,1);
            return {h:`\\(${MathCore.fTex(f1)} ${ops[op]} ${MathCore.fTex(f2)}\\)`, a:MathCore.fCalc(f1,f2,op)};
        }
        if(step==4){ // 유리수 *,/ (2개)
            let f1=rf(), f2=rf(), op=r(2,3);
            return {h:`\\(${MathCore.fTex(f1)} ${ops[op]} ${MathCore.fTex(f2)}\\)`, a:MathCore.fCalc(f1,f2,op)};
        }
        if(step==5){ // 유리수 사칙 혼합 (3개)
            let v1=rf(), v2=rf(), v3=rf(), op1=r(0,3), op2=r(0,3);
            let a1=MathCore.fCalc(v1,v2,op1);
            return {h:`\\(${MathCore.fTex(v1)} ${ops[op1]} ${MathCore.fTex(v2)} ${ops[op2]} ${MathCore.fTex(v3)}\\)`, a:MathCore.fCalc(a1,v3,op2)};
        }
        
        // 6, 7단 심화 (거듭제곱, 절댓값)
        let count = (step==6) ? r(3,5) : r(5,8);
        let curVal = rf(), curTex = MathCore.fTex(curVal);
        for(let i=0; i<count-1; i++){
            let op=r(0,3), next=rf(), nextTex=MathCore.fTex(next);
            if(srnd()>0.6){
                if(srnd()>0.5){ // 절댓값
                    nextTex = `|${nextTex}|`; next = MathCore.fCreate(Math.abs(next.n), Math.abs(next.d));
                } else { // 거듭제곱
                    let ex=r(2,3); nextTex = `(${nextTex})^{${ex}}`;
                    next = MathCore.fCreate(Math.pow(next.n,ex), Math.pow(next.d,ex));
                }
            }
            curVal = MathCore.fCalc(curVal, next, op);
            curTex += ` ${ops[op]} ${nextTex}`;
        }
        return {h:`\\(${curTex}\\)`, a:curVal};
    }

    // --- 시스템 기능 ---
    function getTime() {
        const d=new Date(); const f=(n)=>String(n).padStart(2,'0');
        return `${String(d.getFullYear()).slice(-2)}.${f(d.getMonth()+1)}.${f(d.getDate())}. ${f(d.getHours())}:${f(d.getMinutes())}`;
    }

    function login() {
        user.sid = document.getElementById('sid').value.trim();
        user.name = document.getElementById('sname').value.trim();
        user.sync = parseInt(document.getElementById('syncCode').value) || 0;
        if(!user.sid || !user.name) return alert("학번/이름 입력 필수!");
        
        isLive = true;
        document.getElementById('loginArea').style.display='none';
        document.getElementById('studentView').style.display='flex';
        
        const bar = document.getElementById('stepBar');
        for(let i=1; i<=7; i++){
            bar.innerHTML += `<button id="sb-${i}" class="step-btn" onclick="loadStep(${i})">${i}단계</button>`;
        }
        loadStep(1);
        setInterval(refreshDash, 5000); // 5초 자동 갱신
    }

    function loadStep(s) {
        currentStep = s;
        pSeed = 3000 + s + user.sync; // 동기화 코드 기반 씨앗 고정
        document.querySelectorAll('.step-btn').forEach(b=>b.classList.remove('active'));
        document.getElementById('sb-'+s).classList.add('active');
        
        const area = document.getElementById('problemArea'); area.innerHTML = ''; answers = [];
        for(let i=0; i<20; i++){
            let p = makeProb(s); answers.push(p.a);
            let ui = (s<=2) ? `<input type="text" id="ans-${i}" class="ans-input">` : 
                `<button onclick="this.innerText=(this.innerText=='+'?'-':'+')" id="sign-${i}" class="ans-input" style="width:35px;">+</button>
                 <div class="frac-box"><input type="text" id="num-${i}"><hr style="margin:0; border:0.5px solid #000;"><input type="text" id="den-${i}" value="1"></div>`;
            area.innerHTML += `<div class="prob-item" id="card-${i}">${i+1}. ${p.h} = ${ui}</div>`;
        }
        if(window.MathJax) window.MathJax.typeset();
        save("학습중");
    }

    function submitStep() {
        let score = 0;
        for(let i=0; i<20; i++){
            try {
                let uN, uD=1, t=answers[i], isC=false;
                if(currentStep<=2) uN = parseInt(document.getElementById(`ans-${i}`).value);
                else {
                    let s = document.getElementById(`sign-${i}`).innerText;
                    uN = Math.abs(parseInt(document.getElementById(`num-${i}`).value)) * (s==='-'?-1:1);
                    uD = parseInt(document.getElementById(`den-${i}`).value) || 1;
                }
                if(uN===t.n && uD===t.d) { score += 5; isC=true; }
                document.getElementById(`card-${i}`).style.background = isC ? '#e8f5e9' : '#ffebee';
            } catch(e){}
        }
        save("제출완료", score);
        alert(score + "점 제출되었습니다.");
    }

    function save(status, stepScore = null) {
        const payload = JSON.stringify({ sid:user.sid, name:user.name, status:status, stepIdx:currentStep-1, stepScore:stepScore, time:getTime(), escape:user.escape });
        google.script.run.pushData(payload);
    }

    // --- 이탈/복귀 감지 ---
    window.onblur = () => { if(isLive){ user.escape++; save("⚠️ 이탈함"); } };
    window.onfocus = () => { if(isLive){ save("복귀완료"); } };

    // --- 대시보드 로직 ---
    function openAdmin() { if(prompt("Pass?")==="tngkr1234") { document.getElementById('adminPanel').style.display='block'; refreshDash(); } }

    function refreshDash() {
        google.script.run.withSuccessHandler(data => {
            dashData = data;
            renderDash();
        }).fetchData();
    }

    function renderDash() {
        const body = document.getElementById('dashBody'); body.innerHTML = '';
        const now = Date.now();
        dashData.forEach(r => {
            let rowStyle = "";
            if(r.status.includes("이탈")) rowStyle = "row-escape";
            else if(r.status.includes("복귀")) {
                // 복귀 직후 10초간 파란색 유지 로직 (서버 데이터와 로컬 시간을 대조하거나, 상태값으로 판단)
                rowStyle = "row-return";
            }
            
            // 1행: 기본정보 / 2행: 1~7단 점수
            body.innerHTML += `
                <tr class="${rowStyle}"><td>${r.time}</td><td>${r.sid}</td><td>${r.name}</td><td>${r.status}</td><td>${r.escape}</td></tr>
                <tr class="score-info ${rowStyle}"><td colspan="5">
                    1단:${r.scores[0]} | 2단:${r.scores[1]} | 3단:${r.scores[2]} | 4단:${r.scores[3]} | 5단:${r.scores[4]} | 6단:${r.scores[5]} | 7단:${r.scores[6]}
                </td></tr>`;
        });
    }

    function sortDash(k) { dashData.sort((a,b)=>String(a[k]).localeCompare(String(b[k]))); renderDash(); }
    function resetData() { if(confirm("초기화?")) google.script.run.withSuccessHandler(refreshDash).clearData(); }
    function downloadCSV() {
        let csv = "시각,학번,이름,이탈,1단,2단,3단,4단,5단,6단,7단\n";
        dashData.forEach(r => { csv += `${r.time},${r.sid},${r.name},${r.escape},${r.scores.join(',')}\n`; });
        const blob = new Blob(["\ufeff"+csv], {type:'text/csv;charset=utf-8;'});
        const link = document.createElement("a"); link.href=URL.createObjectURL(blob); link.download=`기록_${getTime()}.csv`; link.click();
    }
</script>
</body>
</html>
