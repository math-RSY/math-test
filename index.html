<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>유리수 연산 마스터 master v2.9</title>
    <script>
        window.MathJax = { tex: { inlineMath: [['\\(', '\\)']], displayMath: [['\\[', '\\]']] }, svg: { fontCache: 'global' } };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.min.js" id="MathJax-script" async></script>
    <style>
        :root { --primary: #0d6efd; --danger: #e84118; --success: #198754; --background: #f0f2f5; --warning: #f1c40f; --dark: #2c3e50; }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: var(--background); font-family: 'Malgun Gothic', sans-serif; -webkit-user-select: none; }
        .container { display: flex; flex-direction: column; height: 100%; width: 100%; max-width: 800px; margin: 0 auto; background: white; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        
        /* 시그니처 로고 */
        .dad-logo-fixed { position: fixed; bottom: 15px; left: 15px; transform: scale(0.3); transform-origin: bottom left; z-index: 15000; pointer-events: none; }
        .signature-container { display: flex; align-items: center; color: #DDD; font-size: 16px; font-weight: bold; }
        .logo-container { background-color: #000; border: 1px solid #1a1a1a; display: inline-flex; flex-direction: column; justify-content: center; align-items: center; padding: 0px 5px; margin-left: 5px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.7); }
        .logo-text { font-size: 40px; font-weight: bold; color: #FFD700; margin: 0; line-height: 1; text-shadow: 0 0 7px #FF00FF, 0 0 15px #FFD700; }
        .initial { letter-spacing: 12px; display: inline-block; margin-right: -13px; }
        .dot { margin: 0; padding: 0; display: inline-block; position: relative; top: -5px; font-size: 35px; line-height: 1; }
        .sub-text { font-size: 8px; color: #a8a8a8; letter-spacing: 1px; margin-top: 2px; line-height: 1; }
        
        /* 관리자 대시보드 (복구됨) */
        #adminPanel { display: none; background: var(--dark); color: white; padding: 15px; max-height: 90%; overflow-y: auto; z-index: 20000; position: absolute; top: 0; width: 100%; box-sizing: border-box; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #555; padding-bottom: 10px; }
        .admin-controls { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 15px; }
        .admin-table { width: 100%; border-collapse: collapse; background: white; color: black; font-size: 0.8rem; }
        .admin-table th, .admin-table td { border: 1px solid #ccc; padding: 8px 4px; text-align: center; }
        .admin-table th { background: #f1f3f5; cursor: pointer; color: #333; }
        .admin-btn { padding: 8px 12px; cursor: pointer; border-radius: 6px; border: none; font-weight: bold; font-size: 11px; color: white; }
        .del-btn { background: #ff7675; color: white; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
        
        /* 학생 화면 UI */
        #studentView { display: none; flex-direction: column; height: 100%; overflow: hidden; }
        #stepMenu { display: flex; overflow-x: auto; padding: 10px; gap: 8px; background: #eee; border-bottom: 1px solid #ddd; align-items: center; }
        .step-btn { flex: 0 0 auto; padding: 8px 12px; border-radius: 8px; border: 2px solid var(--primary); background: white; font-weight: bold; cursor: pointer; }
        .step-btn.active { background: var(--primary); color: white; }
        .refresh-btn { flex: 0 0 auto; padding: 8px 12px; border-radius: 8px; border: 2px solid var(--warning); background: #fffbe6; color: #d4a017; font-weight: bold; cursor: pointer; }
        
        #problemArea { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 120px; }
        .prob-card { margin-bottom: 45px; padding-bottom: 25px; border-bottom: 2px dashed #eee; font-size: 1.3rem; }
        .ans-reveal { color: var(--danger); font-size: 0.95rem; margin-top: 10px; display: none; font-weight: bold; background: #fff1f0; padding: 5px; border-radius: 5px; }
        
        /* 입력 컴포넌트 */
        .input-row { display: flex; align-items: center; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
        .frac-group { display: inline-flex; align-items: center; gap: 5px; background: #f8f9fa; padding: 10px; border-radius: 12px; border: 1px solid #dee2e6; }
        .sign-btn { width: 48px; height: 48px; font-size: 1.6rem; font-weight: bold; border: 2px solid #adb5bd; background: white; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .sign-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .frac-inputs input { width: 65px; height: 38px; text-align: center; font-size: 1.2rem; border: 1px solid #ced4da; border-radius: 5px; }
        .frac-inputs hr { width: 100%; margin: 5px 0; border: 0; border-top: 2px solid #333; }
        .int-input { width: 130px; height: 50px; text-align: center; font-size: 1.5rem; border: 2px solid var(--primary); border-radius: 12px; }
        
        .footer-area { position: absolute; bottom: 0; left: 0; width: 100%; padding: 25px; background: linear-gradient(transparent, white 50%); text-align: center; pointer-events: none; }
        #submitBtn { pointer-events: auto; padding: 16px 70px; font-size: 1.4rem; font-weight: bold; border-radius: 50px; background: var(--success); color: white; border: none; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        
        .admin-trigger { position: fixed; bottom: 10px; right: 10px; z-index: 25000; color: #ccc; cursor: pointer; font-size: 11px; }
        #lockOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 30000; color: white; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .login-input { width: 85%; max-width: 320px; padding: 16px; font-size: 1.1rem; margin-bottom: 12px; border-radius: 15px; border: 2px solid #dee2e6; text-align: center; }
    </style>
</head>
<body>

<div id="lockOverlay"><h1>🚫 화면 이탈 감지 중</h1><p>시험 화면으로 돌아와 주세요.</p></div>
<div class="dad-logo-fixed"><div class="signature-container">by<div class="logo-container"><div class="logo-text"><span class="initial">D</span><span class="dot">.</span><span class="initial">A</span><span class="dot">.</span><span class="initial" style="margin-right: 0; letter-spacing: 0;">D</span><span class="dot">.</span></div><div class="sub-text">Desiring Angel Devil</div></div></div></div>
<div class="admin-trigger" onclick="adminAuth()">[Admin Mode]</div>

<div class="container">
    <div id="adminPanel">
        <div class="admin-header">
            <b style="color:var(--warning); font-size:1.1rem;">📊 실시간 학습 대시보드</b>
            <button class="admin-btn" style="background:#666;" onclick="document.getElementById('adminPanel').style.display='none'">닫기</button>
        </div>
        <div class="admin-controls">
            <button id="masterRevealBtn" class="admin-btn" style="background:var(--danger);" onclick="toggleMasterReveal()">정답 공개: OFF</button>
            <button class="admin-btn" style="background:var(--primary);" onclick="updateAdminDisplay()">수동 갱신</button>
            <button id="filterBtn" class="admin-btn" style="background:#8e44ad;" onclick="toggleTodayOnly()">오늘 기록만: ON</button>
            <button class="admin-btn" style="background:var(--success);" onclick="downloadCSV()">CSV로 저장</button>
        </div>
        <table class="admin-table">
            <thead>
                <tr>
                    <th onclick="sortAdminData('time')">시간 ↕</th>
                    <th onclick="sortAdminData('sid')">학번 ↕</th>
                    <th>이름</th>
                    <th>상태</th>
                    <th onclick="sortAdminData('step')">단계</th>
                    <th onclick="sortAdminData('score')">점수</th>
                    <th>삭제</th>
                </tr>
            </thead>
            <tbody id="adminBody"></tbody>
        </table>
    </div>

    <div id="loginOverlay" style="padding:50px 20px; text-align:center;">
        <h2 style="color:var(--primary); margin-bottom:25px;">📐 유리수 연산 마스터</h2>
        <input type="text" id="sid" class="login-input" placeholder="학번 5자리 (예: 10101)" maxlength="5" inputmode="numeric"><br>
        <input type="text" id="sname" class="login-input" placeholder="이름"><br>
        <input type="text" id="syncCode" class="login-input" placeholder="문제 코드 (미입력 시 자유모드)" inputmode="numeric"><br>
        <button onclick="startApp()" style="width:85%; max-width:320px; padding:20px; background:var(--primary); color:white; border-radius:15px; font-weight:bold; border:none; cursor:pointer; font-size:1.2rem; margin-top:10px;">시험 시작하기</button>
    </div>

    <div id="studentView">
        <div id="stepMenu"></div>
        <div id="problemArea"></div>
        <div class="footer-area"><button id="submitBtn" onclick="grade()" style="display:none;">제출 및 채점</button></div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwS6VKe2OBhdWG18mvQveagQxbGBYctS1jDtzBrh8ebFNjTSVUjCgRc2Vtg50Xb9Ayc/exec"; 
    
    let userData = { id: '', name: '', sync: 0, refreshCount: 0 }, currentStep = 0, currentAnswers = [], isLive = false, pSeed = 1;
    let adminRawData = [], showTodayOnly = true, lastSortKey = 'sid', isMasterReveal = false;

    const MathCore={
        gcd:(a,b)=>b?MathCore.gcd(b,a%b):Math.abs(a),
        fCreate:(n,d=1)=>{
            if(isNaN(n) || isNaN(d) || d===0) return {n:0, d:1, error:true};
            const g=MathCore.gcd(n,d);
            let fn=n/g, fd=d/g;
            if(fd<0){fn*=-1;fd*=-1}
            return {n:fn, d:fd};
        },
        fTex:(f)=>f.d===1?(f.n<0?`(${f.n})`:`${f.n}`):(f.n<0?`\\left( -\\frac{${Math.abs(f.n)}}{${f.d}} \\right)`:`\\frac{${f.n}}{${f.d}}`),
        fCalc:(f1,f2,op)=>{
            if(f1.error || f2.error) return {n:0, d:1, error:true};
            if(op===0)return MathCore.fCreate(f1.n*f2.d+f2.n*f1.d,f1.d*f2.d);
            if(op===1)return MathCore.fCreate(f1.n*f2.d-f2.n*f1.d,f1.d*f2.d);
            if(op===2)return MathCore.fCreate(f1.n*f2.n,f1.d*f2.d);
            if(op===3)return (f2.n===0)?{n:0,d:1,error:true}:MathCore.fCreate(f1.n*f2.d,f1.d*f2.n);
        }
    };

    function srnd(){pSeed=(pSeed*9301+49297)%233280;return pSeed/233280}

    function generateProblem(step){
        const r=(min,max)=>Math.floor(srnd()*(max-min+1))+min;
        const rf=()=>MathCore.fCreate(r(-5,5)||1,r(1,3));
        const ops=['+','-','\\times','\\div'];

        const getSingleVal = (s) => {
            let f = rf();
            if(s <= 2) return { tex: f.n < 0 ? `(${f.n})` : `${f.n}`, val: MathCore.fCreate(f.n) };
            if(s >= 6 && srnd() > 0.7) {
                let exp=r(2,3); 
                return { tex: `(${MathCore.fTex(f)})^{${exp}}`, val: MathCore.fCreate(Math.pow(f.n,exp), Math.pow(f.d,exp)) }; 
            }
            return { tex: MathCore.fTex(f), val: f };
        };

        for(let attempt=0; attempt<20; attempt++){
            try {
                if(step <= 4) {
                    let f1=rf(), f2=rf(), op=(step%2==1?r(0,1):r(2,3));
                    if(step<=2) { f1=MathCore.fCreate(r(-15,15)); f2=MathCore.fCreate(r(-15,15)||1); if(op==3) f1.n=f2.n*r(-4,4)||f2.n; }
                    let res = MathCore.fCalc(f1, f2, op);
                    if(!res.error) return { html: `\\(${MathCore.fTex(f1)} ${ops[op]} ${MathCore.fTex(f2)}\\)`, ans: res };
                }

                let count = (step===5?3 : step===6?r(3,5) : r(5,7));
                let items = []; for(let i=0; i<count; i++) items.push(getSingleVal(step));
                
                let groupStart = -1, groupEnd = -1, isAbsGroup = false;
                if(step >= 6 && srnd() > 0.4) {
                    groupStart = r(0, count-3);
                    groupEnd = groupStart + r(1, 2);
                    isAbsGroup = (step >= 6 && srnd() > 0.5);
                }

                let problemTex = ""; let currentVal = items[0].val;
                let groupVal = null; let groupTex = "";

                for(let i=0; i<count; i++) {
                    let op = (i===0) ? -1 : r(0,3);
                    let tex = items[i].tex; let val = items[i].val;

                    if(i === groupStart) {
                        groupTex = (isAbsGroup ? "\\left| " : "\\left\\{ ") + tex;
                        groupVal = val;
                    } else if(i > groupStart && i <= groupEnd) {
                        groupTex += ` ${ops[op]} ${tex}`;
                        groupVal = MathCore.fCalc(groupVal, val, op);
                        if(i === groupEnd) {
                            groupTex += (isAbsGroup ? " \\right|" : " \\right\\}");
                            if(isAbsGroup) groupVal = MathCore.fCreate(Math.abs(groupVal.n), groupVal.d);
                            if(groupStart === 0) { problemTex = groupTex; currentVal = groupVal; } 
                            else { let prevOp = r(0,3); problemTex += ` ${ops[prevOp]} ${groupTex}`; currentVal = MathCore.fCalc(currentVal, groupVal, prevOp); }
                        }
                    } else if(i < groupStart || i > groupEnd) {
                        if(i === 0) { problemTex = tex; currentVal = val; } 
                        else { problemTex += ` ${ops[op]} ${tex}`; currentVal = MathCore.fCalc(currentVal, val, op); }
                    }
                }
                if(!currentVal.error && Math.abs(currentVal.n) < 100000) return { html: `\\(${problemTex}\\)`, ans: currentVal };
            } catch(e) {}
        }
        return { html: `\\(\\frac{1}{2} + \\frac{1}{2}\\)`, ans: {n:1, d:1} };
    }

    async function updateAdminDisplay() {
        if(SCRIPT_URL.includes("URL")) return;
        try {
            const res = await fetch(`${SCRIPT_URL}?t=${Date.now()}`);
            adminRawData = await res.json();
            const config = adminRawData.find(r => r.sid === 'MASTER_CONFIG');
            isMasterReveal = config && config.status === "ON";
            document.getElementById('masterRevealBtn').innerText = `정답 공개: ${isMasterReveal?'ON':'OFF'}`;
            if (isLive) document.querySelectorAll('.ans-reveal').forEach(el => el.style.display = isMasterReveal ? 'block' : 'none');
            renderAdminTable();
        } catch(e) {}
    }

    function renderAdminTable() {
        const tbody = document.getElementById('adminBody'); tbody.innerHTML = '';
        const todayStr = (new Date().getMonth()+1) + "-" + new Date().getDate();
        let list = adminRawData.filter(r => r.sid !== 'MASTER_CONFIG');
        if (showTodayOnly) list = list.filter(r => r.time && r.time.startsWith(todayStr));
        
        list.sort((a, b) => String(a[lastSortKey]).localeCompare(String(b[lastSortKey]), undefined, {numeric: true}));
        
        list.forEach(row => {
            tbody.innerHTML += `<tr><td>${row.time||'-'}</td><td>${row.sid}</td><td>${row.name}</td><td style="color:${row.status.includes('이탈')?'red':'green'}">${row.status}</td><td>${row.step}</td><td>${row.score}</td><td><span class="del-btn" onclick="deleteEntry('${row.sid}')">X</span></td></tr>`;
        });
    }

    async function sendToCloud(status, score = '-') {
        if (!userData.id || !isLive || SCRIPT_URL.includes("URL")) return;
        const now = new Date();
        const timeStr = (now.getMonth()+1)+"-"+now.getDate()+" "+now.getHours()+":"+String(now.getMinutes()).padStart(2,'0');
        fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ sid: userData.id, name: userData.name, status: status, step: currentStep, score: score, time: timeStr }) });
    }

    function startApp() {
        userData.id = document.getElementById('sid').value.trim();
        userData.name = document.getElementById('sname').value.trim();
        userData.sync = parseInt(document.getElementById('syncCode').value) || 0;
        if(userData.id.length < 3 || !userData.name) return alert("학번과 이름을 입력하세요.");
        isLive = true;
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('studentView').style.display = 'flex';
        const menu = document.getElementById('stepMenu'); menu.innerHTML = '';
        for(let i=1; i<=7; i++) menu.innerHTML += `<button class="step-btn" id="btn-${i}" onclick="loadStep(${i})">${i}단</button>`;
        if(userData.sync === 0) menu.innerHTML += `<button class="refresh-btn" onclick="refreshProblems()">🔄 다시 만들기</button>`;
        sendToCloud("입장");
        setInterval(updateAdminDisplay, 20000); 
    }

    function loadStep(s) {
        currentStep = s; 
        pSeed = 1000 + s + userData.sync + (userData.refreshCount * 77);
        document.querySelectorAll('.step-btn').forEach(b => b.classList.remove('active'));
        if(document.getElementById('btn-'+s)) document.getElementById('btn-'+s).classList.add('active');
        const area = document.getElementById('problemArea'); area.innerHTML = ''; currentAnswers = [];
        for(let i=0; i<20; i++) {
            let p = generateProblem(s); currentAnswers.push(p.ans);
            let ansStr = (p.ans.d===1) ? p.ans.n : `${p.ans.n}/${p.ans.d}`;
            let ui = (s <= 2) ? `<input type="text" id="ans-${i}" class="int-input">` : `<div class="frac-group"><button class="sign-btn active" onclick="this.innerText=(this.innerText=='+'?'-':'+'); this.classList.toggle('active', this.innerText=='+')">+</button><div class="frac-inputs"><input type="text" id="num-${i}"><hr><input type="text" id="den-${i}" value="1"></div></div>`;
            area.innerHTML += `<div class="prob-card"><b>${i+1}.</b> ${p.html} = <div class="input-row">${ui}</div><div class="ans-reveal" style="display:${isMasterReveal?'block':'none'}">(정답: ${ansStr})</div></div>`;
        }
        if (window.MathJax) window.MathJax.typeset();
        document.getElementById('submitBtn').style.display = 'inline-block';
        sendToCloud(s + "단계 진행");
    }

    function refreshProblems() {
        if(currentStep === 0) return alert("단계를 선택하세요.");
        if(!confirm("작성 중인 답안이 초기화됩니다. 새 문제를 만드시겠습니까?")) return;
        userData.refreshCount++;
        loadStep(currentStep);
    }

    function grade() {
        let score = 0;
        for(let i=0; i<20; i++) {
            try {
                let uN, uD = 1, t = currentAnswers[i];
                if(currentStep <= 2) uN = parseInt(document.getElementById(`ans-${i}`).value);
                else {
                    let sign = document.getElementById(`num-${i}`).closest('.frac-group').querySelector('.sign-btn').innerText;
                    uN = Math.abs(parseInt(document.getElementById(`num-${i}`).value)) * (sign==='-'?-1:1);
                    uD = parseInt(document.getElementById(`den-${i}`).value) || 1;
                }
                if(uN === t.n && uD === t.d) score += 5;
            } catch(e){}
        }
        alert("점수: " + score + " / 100"); sendToCloud("제출완료", score);
    }

    // 관리자 전용 기능
    function adminAuth() { if(prompt("Password?") === "tngkr1234") { document.getElementById('adminPanel').style.display='block'; updateAdminDisplay(); } }
    function toggleTodayOnly() { showTodayOnly = !showTodayOnly; document.getElementById('filterBtn').innerText = `오늘 기록만: ${showTodayOnly?'ON':'OFF'}`; renderAdminTable(); }
    function sortAdminData(k) { lastSortKey = k; renderAdminTable(); }
    async function toggleMasterReveal() { fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: isMasterReveal ? 'master_reveal_off' : 'master_reveal_on' }) }); setTimeout(updateAdminDisplay, 1000); }
    async function deleteEntry(sid) { if(confirm(sid+" 학생의 기록을 삭제하시겠습니까?")) { fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "delete", sid: sid }) }); setTimeout(updateAdminDisplay, 1000); } }
    function downloadCSV() {
        let csv = ["\ufeff시간,학번,이름,상태,단계,점수"];
        document.querySelectorAll("#adminBody tr").forEach(r => { csv.push([...r.querySelectorAll("td")].slice(0,6).map(c=>`"${c.innerText}"`).join(",")); });
        const link = document.createElement("a"); link.href = URL.createObjectURL(new Blob([csv.join("\n")], {type:"text/csv"})); link.download="학습기록.csv"; link.click();
    }
    
    window.addEventListener('blur', () => { if(isLive) { document.getElementById('lockOverlay').style.display='flex'; sendToCloud("⚠️ 이탈"); } });
    window.addEventListener('focus', () => { if(isLive) { document.getElementById('lockOverlay').style.display='none'; sendToCloud(currentStep + "단 복귀"); } });
</script>
</body>
</html>
